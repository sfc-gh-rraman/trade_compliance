version: "3.8"

services:
  backend:
    build:
      context: ./copilot/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SNOWFLAKE_CONNECTION_NAME=my_snowflake
      - TC_DATABASE=TRADE_COMPLIANCE_DB
      - TC_SCHEMA=ATOMIC
      - TC_WAREHOUSE=COMPLIANCE_COMPUTE_WH
    volumes:
      - ~/.snowflake:/home/appuser/.snowflake:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./copilot/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

networks:
  default:
    name: trade-compliance-network
